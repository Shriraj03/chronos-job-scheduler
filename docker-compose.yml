services:

  mysql:

    image: mysql:8

    container_name: chronos_mysql

    restart: always

    environment:

      MYSQL_ROOT_PASSWORD: root

      MYSQL_DATABASE: chronos_db

    ports:

      - "3307:3306"

    volumes:

      - mysql_data:/var/lib/mysql

  redis:

    image: redis:7

    container_name: chronos_redis

    restart: always

    ports:

      - "6379:6379"

  backend:

    build: ./Backend

    container_name: chronos_backend

    restart: always

    ports:

      - "3000:3000"

    depends_on:

      - mysql

      - redis

    environment:

      PORT: 3000

      DB_NAME: chronos_db

      DB_USER: root

      DB_PASS: root

      DB_HOST: mysql

      DB_DIALECT: mysql

      JWT_SECRET: MY_SECRET_KEY

      REDIS_HOST: redis

      REDIS_PORT: 6379

  frontend:

    build: ./Frontend

    container_name: chronos_frontend

    restart: always

    ports:

      - "5173:5173"

    depends_on:

      - backend

volumes:

  mysql_data: